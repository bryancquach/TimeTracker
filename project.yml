name: TimeTracker
options:
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"

targets:
  TimeTracker:
    type: application
    platform: macOS
    sources:
      - path: TimeTracker
        excludes:
          - Info.plist
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.timetracker.app
        INFOPLIST_FILE: TimeTracker/Info.plist
        CODE_SIGN_ENTITLEMENTS: TimeTracker/TimeTracker.entitlements
        GENERATE_INFOPLIST_FILE: false
